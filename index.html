<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AISANCE · cost & behaviour dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{--teal:#0f766e;--teal2:#1d9e75;--ink:#1c2b2b;--muted:#5b6b6b;--line:#e4ecea;--bg:#f7faf9;--card:#fff;--danger:#b4453c;--amber:#b5791a;--blue:#2f6fb0;--violet:#6d5bd0;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:14px 24px;border-bottom:1px solid var(--line);background:var(--card);display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:5}
  header h1{font-size:16px;margin:0;color:var(--teal);font-weight:700;letter-spacing:.3px}
  header .t{color:var(--muted);font-size:13px;flex:1}
  header input{font:13px monospace;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg)}
  header input#key{width:200px}
  header button{padding:6px 12px;border:1px solid var(--teal);color:var(--teal);background:var(--card);border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
  main{padding:18px 24px;max-width:1180px;margin:0 auto}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .tabs,.filters,.seg{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .seg{margin-right:6px;color:var(--muted);font-size:12px}
  .tab{padding:7px 13px;border-radius:9px;color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;border:none;background:none}
  .tab.on{background:var(--teal);color:#fff}
  .chip{padding:5px 10px;border:1px solid var(--line);border-radius:8px;color:var(--muted);font-size:12px;background:var(--card);cursor:pointer}
  .chip.on{border-color:var(--teal);color:var(--teal);font-weight:600;background:#eaf5f1}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px}
  .cv{font-size:23px;font-weight:700}.cl{color:var(--muted);font-size:12px;margin-top:2px}.cs{color:var(--teal);font-size:12px;margin-top:4px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
  .insights{display:flex;flex-direction:column;gap:9px}
  .ins{display:flex;gap:10px;align-items:flex-start;font-size:13.5px}
  .ins .dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:none}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:6px 0 16px}
  th,td{padding:8px 11px;text-align:left;border-bottom:1px solid var(--line);font-size:12.5px;white-space:nowrap}
  th{background:#eef5f3;color:var(--muted);font-weight:600}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
  td.b{font-weight:700;color:var(--teal)}
  tr:last-child td{border-bottom:0}
  a{color:var(--teal);cursor:pointer}
  h3{font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
  .barcell{position:relative;min-width:90px}
  .barcell .fill{position:absolute;left:0;top:50%;transform:translateY(-50%);height:14px;background:#d7efe6;border-radius:4px;z-index:0}
  .barcell span{position:relative;z-index:1}
  .muted{color:var(--muted)}.b{font-weight:700}
  .badge{display:inline-block;background:#fde9c8;color:#8a5a00;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:600}
  .badge.an{background:#eef2f7;color:#3f5a78}
  .err{background:#fbeaea;border:1px solid #efc9c6;color:var(--danger);padding:12px 14px;border-radius:10px}
  code{background:#eef5f3;border-radius:5px;padding:1px 5px;font-size:12px}
  .chat{display:flex;flex-direction:column;gap:9px;max-width:780px}
  .msg .who{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;gap:8px}.msg .ts{margin-left:auto}
  .bubble{padding:9px 12px;border-radius:12px;white-space:pre-wrap;word-break:break-word;font-size:13.5px}
  .msg.u .bubble{background:var(--teal);color:#fff}.msg.a .bubble{background:#fff;border:1px solid var(--line)}.msg.s .bubble{background:#fff7e6;border:1px solid #f0e2c0;font-style:italic}
  .iod{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;padding:6px 12px}
  .iod summary{cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:600}
  .iogrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .iol{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  .iod pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:11.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word;max-height:340px;overflow:auto;margin:0}
  @media(max-width:760px){.iogrid{grid-template-columns:1fr}}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>AISANCE</h1><span class="t">cost &amp; behaviour · token observability</span>
  <input id="base" title="function base URL">
  <input id="key" type="password" placeholder="admin key" title="ADMIN_DASHBOARD_SECRET">
  <button id="go">Load</button>
</header>
<main>
  <div class="nav"><div class="tabs" id="tabs"></div><div class="filters" id="filters"></div></div>
  <div id="content"><p class="muted">Enter the admin key and press Load.</p></div>
</main>
<script>
const DEFAULT_BASE="https://sdmhghqecsiddiitorgs.supabase.co/functions/v1/admin-dashboard";
const VIEWS=[["overview","Overview"],["log","Log"],["spending","Spending"],["users","Users"],["sessions","Sessions"]];
const GROUPS=["kind","user","session","device","time"];
const st={view:"overview",days:3650,eval:false,group:"user",session:null,user:null};
let charts=[];

const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const n=(x)=>Number(x||0).toLocaleString("en-US");
const usd=(x)=>"$"+Number(x||0).toFixed(Number(x)>=1?2:4);
const usd6=(x)=>"$"+Number(x||0).toFixed(6);
const pct=(a,b)=>b?Math.round(a/b*100)+"%":"0%";
const sid=(x)=>x?esc(String(x).slice(0,8)):"—";
const cfg=()=>({base:$("base").value.trim()||DEFAULT_BASE,key:$("key").value.trim()});
const persist=()=>{const c=cfg();localStorage.setItem("aisance_dash",JSON.stringify(c));};

async function api(extra={}){
  const c=cfg(); if(!c.key) throw new Error("Enter the admin key first.");
  const p=new URLSearchParams({key:c.key,format:"json",view:st.view,days:String(st.days)});
  if(st.eval)p.set("eval","1");
  if(st.view==="spending")p.set("group",st.group);
  if(st.user)p.set("user",st.user);
  if(st.session)p.set("session",st.session);
  Object.entries(extra).forEach(([k,v])=>p.set(k,v));
  const res=await fetch(c.base+"?"+p.toString());
  const j=await res.json().catch(()=>({error:"bad_response"}));
  if(!res.ok||j.error) throw new Error(j.error==="unauthorized"?"Key rejected (401). Check the admin key.":(j.error||("HTTP "+res.status)));
  return j.data;
}

function renderControls(){
  $("tabs").innerHTML=VIEWS.map(([v,l])=>`<button class="tab ${v===st.view||(v==='sessions'&&st.view==='session')?'on':''}" data-v="${v}">${l}</button>`).join("");
  const grp=st.view==="spending"?`<span class="seg">group</span>${GROUPS.map(g=>`<span class="chip ${g===st.group?'on':''}" data-g="${g}">${g}</span>`).join("")}<span style="width:10px"></span>`:"";
  const days=[7,30,90,3650].map(d=>`<span class="chip ${d===st.days?'on':''}" data-d="${d}">${d>=3650?'all':d+'d'}</span>`).join("");
  const ev=`<span class="chip ${st.eval?'on':''}" data-eval="1">incl. eval</span>`;
  $("filters").innerHTML=grp+days+ev;
}

function donut(id,parts){
  const el=document.getElementById(id); if(!el)return;
  charts.push(new Chart(el,{type:"doughnut",data:{labels:parts.map(p=>p.label),datasets:[{data:parts.map(p=>+p.v),backgroundColor:parts.map(p=>p.c),borderWidth:0}]},options:{cutout:"62%",plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>c.label+": $"+(+c.parsed).toFixed(4)}}}}}));
}
function bars(id,labels,data){
  const el=document.getElementById(id); if(!el)return;
  charts.push(new Chart(el,{type:"bar",data:{labels,datasets:[{data,backgroundColor:"#1d9e75",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>"$"+(+c.parsed.y).toFixed(4)}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,autoSkip:false}},y:{ticks:{font:{size:10},callback:v=>"$"+(+v).toFixed(2)}}}}}));
}

async function render(){
  renderControls();
  charts.forEach(c=>{try{c.destroy()}catch(e){}}); charts=[];
  $("content").innerHTML=`<p class="muted">Loading…</p>`;
  try{
    const d=await api();
    if(st.view==="overview"){ $("content").innerHTML=overview(d); paintOverview(d); }
    else if(st.view==="log") $("content").innerHTML=logTable(d);
    else if(st.view==="spending") $("content").innerHTML=spendingTable(d);
    else if(st.view==="users") $("content").innerHTML=usersTable(d);
    else if(st.view==="sessions") $("content").innerHTML=sessionsTable(d);
    else if(st.view==="session") $("content").innerHTML=sessionDetail(d);
  }catch(e){ $("content").innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}

function overview(o){
  const cb=o.cost_breakdown||{}; const cost=+o.cost_usd||0;
  const card=(l,v,s)=>`<div class="card"><div class="cv">${v}</div><div class="cl">${esc(l)}</div>${s?`<div class="cs">${s}</div>`:""}</div>`;
  const cards=`<div class="cards">
    ${card("Total cost",usd(cost),n(o.credits)+" credits")}
    ${card("Requests",n(o.requests),n(o.users)+" users · "+n(o.sessions)+" sessions")}
    ${card("Anonymous",n(o.anon_requests),pct(o.anon_requests,o.requests)+" of requests")}
    ${card("Avg cost / request",usd(cost/(o.requests||1)))}
    ${card("Ceiling hits",n(o.ceiling_hits),pct(o.ceiling_hits,o.requests)+" of turns")}
    ${card("Cache-read",n(o.cache_read)+" tok",pct(o.cache_read,(+o.input)+(+o.cache_read))+" of input served cached")}
  </div>`;
  const parts=[{label:"Input",v:cb.input,c:"#1d9e75"},{label:"Output",v:cb.output,c:"#2f6fb0"},{label:"Cache-read",v:cb.cache_read,c:"#b5791a"},{label:"Cache-write",v:cb.cache_write,c:"#6d5bd0"}].filter(p=>+p.v>0);
  const legend=parts.map(p=>`<div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:3px 0"><span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${p.c};margin-right:7px"></span>${p.label}</span><span class="b">${usd(p.v)} <span class="muted">(${pct(p.v,cost)})</span></span></div>`).join("");
  const burden=`<div class="panel"><h3>Where the cost goes</h3><div style="display:flex;gap:16px;align-items:center"><div style="width:150px;height:150px;flex:none"><canvas id="cbd"></canvas></div><div style="flex:1">${legend}</div></div></div>`;
  const ins=insights(o);
  const trend=`<div class="panel"><h3>Daily cost</h3><div style="height:200px"><canvas id="byday"></canvas></div></div>`;
  const kinds=`<div class="panel"><h3>By operation kind</h3><table><tr><th>kind</th><th class="r">requests</th><th class="r">cost</th><th class="r">share</th></tr>${(o.by_kind||[]).map(k=>`<tr><td>${esc(k.kind)}</td><td class="r">${n(k.reqs)}</td><td class="r b">${usd(k.cost)}</td><td class="r">${pct(k.cost,cost)}</td></tr>`).join("")}</table></div>`;
  return cards+`<div class="grid2">${burden}<div class="panel"><h3>Conclusions</h3><div class="insights">${ins}</div></div></div>`+`<div class="grid2">${trend}${kinds}</div>`;
}
function insights(o){
  const cb=o.cost_breakdown||{}; const cost=+o.cost_usd||0;
  const pairs=[["input",cb.input,"#1d9e75","Input tokens (system prompt + memory digest sent every turn)"],["output",cb.output,"#2f6fb0","Model output"],["cache_read",cb.cache_read,"#b5791a","Cache reads"],["cache_write",cb.cache_write,"#6d5bd0","Cache writes"]];
  const top=pairs.filter(p=>+p[1]>0).sort((a,b)=>b[1]-a[1])[0];
  const out=[];
  if(top) out.push([top[2],`<b>${top[0].replace("_","-")} is your biggest cost driver</b> — ${usd(top[1])} (${pct(top[1],cost)}). ${top[0]==="input"?"Trimming the system prompt / digest is the highest-leverage saving.":""}`]);
  const cacheEff=pct(o.cache_read,(+o.input)+(+o.cache_read));
  out.push(["#b5791a",`Caching serves <b>${cacheEff}</b> of input tokens at $0.30/M instead of $3/M — meaningful savings already.`]);
  if(+o.cache_write===0) out.push(["#b4453c",`<b>Cache-write tokens read 0</b> — they aren't captured in older rows. After the proxy update they'll show here (Anthropic bills these at $3.75/M).`]);
  if(+o.anon_requests===0) out.push(["#3f5a78",`<b>0 anonymous requests logged</b> — anon + eval traffic spent real tokens but wasn't recorded (fixed going forward). Your true Anthropic bill is in the Console, not here.`]);
  else out.push(["#3f5a78",`Anonymous traffic is <b>${pct(o.anon_requests,o.requests)}</b> of requests.`]);
  out.push(["#1d9e75",`Average turn costs <b>${usd(cost/(o.requests||1))}</b>; ${pct(o.ceiling_hits,o.requests)} of turns hit the per-turn token ceiling.`]);
  return out.map(([c,t])=>`<div class="ins"><span class="dot" style="background:${c}"></span><span>${t}</span></div>`).join("");
}
function paintOverview(o){
  const cb=o.cost_breakdown||{};
  donut("cbd",[{label:"Input",v:cb.input,c:"#1d9e75"},{label:"Output",v:cb.output,c:"#2f6fb0"},{label:"Cache-read",v:cb.cache_read,c:"#b5791a"},{label:"Cache-write",v:cb.cache_write,c:"#6d5bd0"}].filter(p=>+p.v>0));
  const days=(o.by_day||[]).slice().reverse();
  bars("byday",days.map(d=>d.day.slice(5)),days.map(d=>+d.cost));
}

function logTable(rows){
  if(!rows.length) return `<p class="muted">No requests in this window.</p>`;
  return `<p class="muted">Most recent ${rows.length} requests · priced input $3 / output $15 / cache-read $0.30 / cache-write $3.75 per million tokens.</p><table><tr><th>timestamp</th><th>who</th><th>kind</th><th class="r">in $</th><th class="r">out $</th><th class="r">cache-r $</th><th class="r">cache-w $</th><th class="r">total $</th><th class="r">latency</th><th>session</th></tr>${rows.map(r=>`<tr><td>${esc(r.ts)}</td><td>${who(r.ident)}</td><td>${esc(r.kind)}${r.over_token_ceiling?' <span class="badge">⚠</span>':''}</td><td class="r" title="${n(r.input_tokens)} tok">${usd6(r.input_cost)}</td><td class="r" title="${n(r.output_tokens)} tok">${usd6(r.output_cost)}</td><td class="r" title="${n(r.cache_read_tokens)} tok">${usd6(r.cache_cost)}</td><td class="r" title="${n(r.cache_creation_tokens)} tok">${usd6(r.cache_write_cost)}</td><td class="r b">${usd6(r.cost_usd)}</td><td class="r">${n(r.latency_ms)}ms</td><td>${r.session_id?`<a data-session="${esc(r.session_id)}">${sid(r.session_id)}</a>`:"—"}</td></tr>`).join("")}</table>`;
}
function who(id){ return id==="anonymous"?`<span class="badge an">anon</span>`:esc(id); }
function spendingTable(rows){
  if(!rows.length) return `<p class="muted">No spending in this window.</p>`;
  const total=rows.reduce((s,r)=>s+ +r.cost_usd,0); const max=Math.max(...rows.map(r=>+r.cost_usd),0.0001);
  const head={session:"session",device:"device",time:"day",user:"user",kind:"kind"}[st.group];
  const cell=(r)=>(st.group==="session"&&/^[0-9a-f-]{36}$/.test(String(r.grp)))?`<a data-session="${esc(r.grp)}">${sid(r.grp)}</a>`:who(r.grp);
  return `<p class="muted">Grouped by <b>${esc(st.group)}</b> · ${rows.length} groups · total ${usd(total)}.</p><table><tr><th>${esc(head)}</th><th class="r">turns</th><th class="r">users</th><th class="r">devices</th><th class="r">cost</th><th class="barcell">share</th><th>first</th><th>last</th></tr>${rows.map(r=>`<tr><td>${cell(r)}</td><td class="r">${n(r.turns)}</td><td class="r">${n(r.users)}</td><td class="r">${n(r.devices)}</td><td class="r b">${usd(r.cost_usd)}</td><td class="barcell"><span class="fill" style="width:${Math.round(+r.cost_usd/max*100)}%"></span><span>${pct(r.cost_usd,total)}</span></td><td>${esc(r.first_at)}</td><td>${esc(r.last_at)}</td></tr>`).join("")}</table>`;
}
function limitStatus(u){ // #4 — approaching = ≥80% of allowance used; at limit = none left
  const cap=+u.credits||0; if(!cap||u.credits_remaining==null) return "—";
  const rem=+u.credits_remaining;
  if(rem<=0) return '<span class="badge">⛔ at limit</span>';
  if((cap-rem)/cap>=0.8) return '<span class="badge">⚠︎ approaching</span>';
  return "OK";
}
function usersTable(rows){
  if(!rows.length) return `<p class="muted">No usage in this window.</p>`;
  const sorted=[...rows].sort((a,b)=>(+b.cost_usd||0)-(+a.cost_usd||0)); // #4 — highest cost first
  return `<p class="muted">Sorted by cost (highest first). Email → iCloud anchor → anon id. Click a user to see their sessions.</p><table><tr><th>user</th><th>plan</th><th>status</th><th class="r">devices</th><th class="r">reqs</th><th class="r">sessions</th><th class="r">cost</th><th class="r">credits left</th><th>last seen</th></tr>${sorted.map(u=>`<tr><td><a data-user="${esc(u.user_id)}">${esc(u.ident)}</a>${u.is_test?' <span class="badge">test</span>':''}</td><td>${esc(u.plan_id||"—")}</td><td>${limitStatus(u)}</td><td class="r">${n(u.devices)}</td><td class="r">${n(u.reqs)}</td><td class="r">${n(u.sessions)}</td><td class="r b">${usd(u.cost_usd)}</td><td class="r">${u.credits_remaining==null?"—":n(u.credits_remaining)}</td><td>${esc(u.last_seen)}</td></tr>`).join("")}</table>`;
}
function sessionsTable(rows){
  const head=st.user?`<p class="muted">Sessions for ${sid(st.user)} · <a data-user="">all users</a></p>`:"";
  if(!rows.length) return head+`<p class="muted">No sessions with a session_id yet — they populate once a TestFlight build with the new client (it stamps <code>x-aisance-session</code>) ships.</p>`;
  return head+`<table><tr><th>session</th><th>user</th><th>device</th><th class="r">turns</th><th class="r">cost</th><th>started</th><th>ended</th></tr>${rows.map(s=>`<tr><td><a data-session="${esc(s.session_id)}">${sid(s.session_id)}</a></td><td>${who(s.ident)}</td><td>${s.device_id?sid(s.device_id):"—"}</td><td class="r">${n(s.turns)}</td><td class="r b">${usd(s.cost_usd)}</td><td>${esc(s.started)}</td><td>${esc(s.ended)}</td></tr>`).join("")}</table>`;
}
function ioBlocks(io){
  if(!io||!io.length) return "";
  const cost=(r)=>((+r.input_tokens*3)+(+r.output_tokens*15))/1e6;   // #5 request cost from tokens
  return `<h3>Chat monitoring (${io.length})</h3><p class="muted">Per turn: user message, AI response, time, tokens, cost, model/mode.</p>`+io.map((r)=>{
    const um=r.user_message??r.input_text??"", ar=r.ai_response??r.output_text??"";
    const dump=(r.user_message!=null&&(r.input_text||r.output_text))?`<details class="iod"><summary>full prompt + raw completion (debug)</summary><div class="iogrid"><div><div class="iol">INPUT</div><pre>${esc(r.input_text||"")}</pre></div><div><div class="iol">OUTPUT</div><pre>${esc(r.output_text||"")}</pre></div></div></details>`:"";
    return `<div class="panel" style="border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0"><div class="muted" style="font-size:12px;margin-bottom:6px"><b>${esc(r.kind||"chat")}</b> · ${esc(r.model||"—")} · in ${n(r.input_tokens)} / out ${n(r.output_tokens)} tok · ${usd6(cost(r))} · ${esc(r.ts||"")}</div><div class="chat"><div class="msg u"><div class="who">user message</div><div class="bubble">${esc(um)}</div></div><div class="msg a"><div class="who">AI response</div><div class="bubble">${esc(ar)}</div></div></div>${dump}</div>`;
  }).join("");
}
function sessionDetail(d){
  const reqs=d.requests||[],tx=d.transcript||[];
  const rt=`<h3>Requests (${reqs.length})</h3><table><tr><th>ts</th><th>kind</th><th class="r">in $</th><th class="r">out $</th><th class="r">cache-r $</th><th class="r">cache-w $</th><th class="r">latency</th></tr>${reqs.map(r=>`<tr><td>${esc(r.ts)}</td><td>${esc(r.kind)}</td><td class="r">${usd6(r.input_tokens*3/1e6)}</td><td class="r">${usd6(r.output_tokens*15/1e6)}</td><td class="r">${usd6(r.cache_read_tokens*0.3/1e6)}</td><td class="r">${usd6((r.cache_creation_tokens||0)*3.75/1e6)}</td><td class="r">${n(r.latency_ms)}ms</td></tr>`).join("")}</table>`;
  const t=tx.length?`<h3>Transcript (${tx.length}) — full input &amp; output</h3><div class="chat">${tx.map(m=>`<div class="msg ${m.role==='assistant'?'a':(m.role==='system'?'s':'u')}"><div class="who">${esc(m.role)}${m.widget_kind?` · <span class="badge">${esc(m.widget_kind)}</span>`:""}<span class="ts">${esc(m.created_at)}</span></div><div class="bubble">${esc(m.text)}</div></div>`).join("")}</div>`:`<h3>Transcript</h3><p class="muted">No transcript stored — captured only for allowlisted test accounts on sandbox/TestFlight builds (production stays on-device).</p>`;
  return `<p class="muted"><a data-back="1">← all sessions</a></p>`+rt+t+ioBlocks(d.io);
}

document.addEventListener("click",(e)=>{
  const t=e.target.closest("[data-v],[data-d],[data-g],[data-eval],[data-session],[data-user],[data-back]"); if(!t)return;
  if(t.dataset.v){st.view=t.dataset.v;st.session=null;if(t.dataset.v!=="sessions")st.user=null;}
  else if(t.dataset.d){st.days=+t.dataset.d;}
  else if(t.dataset.g){st.group=t.dataset.g;}
  else if(t.dataset.eval!=null){st.eval=!st.eval;}
  else if(t.dataset.session!=null){st.session=t.dataset.session;st.view="session";}
  else if(t.dataset.user!=null){st.user=t.dataset.user||null;st.view="sessions";}
  else if(t.dataset.back){st.view="sessions";st.session=null;}
  render();
});
$("go").addEventListener("click",()=>{persist();render();});
$("key").addEventListener("keydown",(e)=>{if(e.key==="Enter"){persist();render();}});
(function init(){
  const s=JSON.parse(localStorage.getItem("aisance_dash")||"{}");
  $("base").value=s.base||DEFAULT_BASE; $("key").value=s.key||"";
  if(s.key) render(); else renderControls();
})();
</script>
